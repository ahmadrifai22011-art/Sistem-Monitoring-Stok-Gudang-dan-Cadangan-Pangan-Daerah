<!DOCTYPE html>

<head>

<link rel="stylesheet" href="css/style.css">

<body>

<div class="login-container">

<p>Cadangan Pangan Daerah</p>

<form id="loginForm">

type="email"
id="email"
placeholder="admin@gov.id"

type="password"

required>

<button type="submit">

Masuk

</button>

</form>

</div>

</div>
