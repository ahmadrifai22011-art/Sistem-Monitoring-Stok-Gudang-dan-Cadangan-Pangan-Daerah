<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Stok</title>

<link rel="stylesheet" href="css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

<div class="logo-area">
<img src="assets/logo.png" class="logo">
<h2>Monitoring Stok</h2>
</div>

<ul>

<li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

<li class="active"><a href="stock.html"><i class="fa-solid fa-boxes-stacked"></i> Kelola Stok</a></li>

<li><a href="warehouse.html"><i class="fa-solid fa-warehouse"></i> Data Gudang</a></li>

<li><a href="reports.html"><i class="fa-solid fa-file-lines"></i> Laporan</a></li>

<li><a href="users.html"><i class="fa-solid fa-users"></i> User</a></li>

<li><a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h1>Kelola Stok</h1>

</div>

<div class="card">

<h3>Tambah Data Stok</h3>

<br>

<input id="namaBarang" type="text" placeholder="Nama Komoditas">

<br><br>

<select id="kategori">

<option>Pangan Pokok</option>

<option>Bahan Pokok</option>

<option>Cadangan Pangan</option>

</select>

<br><br>

<input id="jumlah" type="number" placeholder="Jumlah (Ton)">

<br><br>

<select id="jenis">

<option>Stok Masuk</option>

<option>Stok Keluar</option>

</select>

<br><br>

<input id="tanggal" type="date">

<br><br>

<button onclick="simpanStok()">

Tambah Data

</button>

</div>

<br>

<div class="table-box">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

<h2>Daftar Stok</h2>

<input
type="text"
id="search"
placeholder="Cari komoditas..."
onkeyup="cariData()"
style="
width:300px;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
">

</div>

<table>

<thead>
<tr>
<th>Nama</th>
<th>Kategori</th>
<th>Jumlah</th>
<th>Jenis</th>
<th>Tanggal</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabelStok">

</tbody>

</table>

</>

</div>

<script src="js/stock.js"></script>

</body>

</html>
